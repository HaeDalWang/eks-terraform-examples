# ============================================================
# kube-prometheus-stack (Agent 클러스터)
# ============================================================
#
# Central 클러스터와 차이점:
#   - Grafana: 미배포 (Central에서만 조회)
#   - Alertmanager: 미배포 (Central Mimir Alertmanager 사용)
#   - remote-write: Central Mimir (HTTPS, 외부)
#   - alerting: Central Mimir Alertmanager (HTTPS, 외부)
#

fullnameOverride: kube-prometheus

# ============================================================
# Prometheus
# ============================================================
prometheus:
  prometheusSpec:
    externalLabels:
      cluster: ${cluster_name}
    disableCompaction: true
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
  ingress:
    enabled: false
  serviceMonitorSelectorNilUsesHelmValues: false
  podMonitorSelectorNilUsesHelmValues: false
  ruleSelectorNilUsesHelmValues: false
  # Agent → Central Mimir remote-write (HTTPS, 외부)
  remoteWrite:
  - url: ${central_mimir_endpoint}/api/v1/push
    # TODO: 프로덕션에서는 인증 추가
    # basicAuth:
    #   username:
    #     name: mimir-auth
    #     key: username
    #   password:
    #     name: mimir-auth
    #     key: password
  # Alert → Central Mimir Alertmanager (HTTPS, 외부)
  alerting:
    alertmanagers:
    - staticConfigs:
      - targets:
        - ${cluster_name}  # placeholder, 아래 실제 설정 사용
      scheme: https
      pathPrefix: /alertmanager
      # TODO: 프로덕션에서는 인증 추가
      # basicAuth:
      #   username:
      #     name: mimir-auth
      #     key: username
      #   password:
      #     name: mimir-auth
      #     key: password
    # 실제 Central Mimir 주소
    - staticConfigs:
      - targets:
        - ${central_mimir_endpoint}
      scheme: https
      pathPrefix: /alertmanager

# ============================================================
# 미배포 컴포넌트
# ============================================================
alertmanager:
  enabled: false

grafana:
  enabled: false

# ============================================================
# 수집 에이전트
# ============================================================
prometheus-node-exporter:
  priorityClassName: system-node-critical
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: eks.amazonaws.com/compute-type
              operator: NotIn
              values:
                - fargate

kubeApiServer:
  enabled: false
kubeControllerManager:
  enabled: false
coreDns:
  enabled: true
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: true
kubelet:
  enabled: true
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
  operatingSystems:
    darwin:
      enabled: false

# PrometheusRules (로컬 평가 → Central Mimir Alertmanager로 전송)
defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: false
    configReloaders: false
    general: true
    k8s: true
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: false
    prometheusOperator: false
