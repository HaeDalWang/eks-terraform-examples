# ref: https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
# SingleBinary 모드 (PoC), 프로덕션에서는 SimpleScalable 또는 Distributed로 전환

deploymentMode: SingleBinary

serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: ${sa_arn}

loki:
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true
  # S3 경로: loki/ prefix
  storage:
    type: s3
    use_thanos_objstore: true
    object_store:
      storage_prefix: loki
      s3:
        bucket_name: ${s3_bucket}
        region: ${aws_region}
    bucketNames:
      chunks: ${s3_bucket}
      ruler: ${s3_bucket}
      admin: ${s3_bucket}

chunksCache:
  enabled: false
minio:
  enabled: false

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# 다른 배포 모드 비활성화
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

gateway:
  enabled: true
  replicas: 1

canary:
  enabled: false
