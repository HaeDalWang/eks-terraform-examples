# ref: https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
# Mimir와 동일 S3 버킷 사용, prefix "loki/" 로 경로 분리 (IRSA)

deploymentMode: SingleBinary

# Mimir 버킷 + loki prefix, IRSA 인증
serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: ${loki_sa_arn}

loki:
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true
  # S3 스토리지 (Mimir와 같은 버킷, prefix "loki/" 로 분리)
  # 차트 템플릿이 bucketNames.chunks를 참조하므로 반드시 존재해야 함
  storage:
    type: s3
    use_thanos_objstore: true
    object_store:
      storage_prefix: loki
      s3:
        bucket_name: ${loki_s3_bucket}
        region: ${aws_region}
    bucketNames:
      chunks: ${loki_s3_bucket}
      ruler: ${loki_s3_bucket}
      admin: ${loki_s3_bucket}

# chunksCache 비활성화
chunksCache:
  enabled: false
# MinIO 비활성화 (S3 + IRSA 사용)
minio:
  enabled: false

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# 다른 배포 모드 replica 0
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

gateway:
  enabled: true
  replicas: 1

canary:
  enabled: false
